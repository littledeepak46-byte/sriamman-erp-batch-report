services:

  # ── PostgreSQL database ──────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sarmc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sarmc_erp
      POSTGRES_USER: sarmc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sarmc1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sarmc -d sarmc_erp"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sarmc_net

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sarmc_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sarmc:${DB_PASSWORD:-sarmc1234}@db:5432/sarmc_erp
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"       # Swagger UI: http://localhost:8000/api/docs
    networks:
      - sarmc_net

  # ── React frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sarmc_frontend
    restart: unless-stopped
    ports:
      - "80:80"           # App: http://localhost
    depends_on:
      - backend
    networks:
      - sarmc_net

volumes:
  postgres_data:

networks:
  sarmc_net:
    driver: bridge
